            actionPulse: { '0%': { opacity: '1', transform: 'scale(1)' }, '100%': { opacity: '0.9', transform: 'scale(0.98)' } },
          }
        }

    }

  <style>
    input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    ::-webkit-scrollbar { width: 16px; height: 16px; border-left: 4px solid #000; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #38bdf8; border: 2px solid #020617; }
    ::-webkit-scrollbar-thumb:hover { background: #0ea5e9; }
    
    /* 黑暗工業網格 + 掃描線 */
    .cyber-brutal-grid {
      background-color: #020617;

    /* 賽博粗野裝甲板 */

      outline: none;

    .c-input:focus {
      border-color: #38bdf8;
      box-shadow: 4px 4px 0px 0px #0369a1;

    .c-input-danger:focus { border-color: #ef4444; box-shadow: 4px 4px 0px 0px #b91c1c; color: #ef4444; }

      transform: translate(6px, 6px);
      box-shadow: 0px 0px 0px 0px #000;
    }
    .c-btn-cyan { background: #06b6d4; color: #000; border-color: #0891b2; box-shadow: 6px 6px 0px 0px #164e63; }
    .c-btn-cyan:hover { background: #22d3ee; }
    .c-btn-red { background: #ef4444; color: #000; border-color: #b91c1c; box-shadow: 6px 6px 0px 0px #7f1d1d; }
    .c-btn-red:hover { background: #f87171; }

    /* 工業危險膠帶 */
    .hazard-stripes {
      background: repeating-linear-gradient(45deg, #000, #000 15px, #eab308 15px, #eab308 30px);
    }
    .hazard-stripes-red {
      background: repeating-linear-gradient(45deg, #000, #000 15px, #ef4444 15px, #ef4444 30px);

    .c-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #1e293b; border: 4px solid #0ea5e9; transition: .2s; box-shadow: 4px 4px 0px 0px #0369a1; }

    input:checked + .c-slider { background-color: #3b82f6; border-color: #93c5fd; }
    input:checked + .c-slider:before { transform: translateX(40px); background-color: #fff; }

    /* 霓虹文字發光 */
    .neon-text-cyan { text-shadow: 0 0 10px rgba(6, 182, 212, 0.8); }

<body class="cyber-brutal-grid text-slate-100 font-mono min-h-screen relative overflow-x-hidden pt-8 pb-20 selection:bg-cyan-500 selection:text-black text-lg md:text-xl">

  <div class="fixed inset-0 scanlines"></div>
  <div id="root" class="relative z-10"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const safeGetStorage = (key, defVal) => { try { return localStorage.getItem(key) || defVal; } catch(e) { return defVal; } };
    const safeSetStorage = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

    // === SMART DUAL-NODE API ROUTER ===
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxWnT6COS2NuL5LmtRZql5UmvEHcFDEtdha2SY5-NI3RBjHxV5xz0oUWlQL1M7P-0GN/exec';
    
    const gasAPI = (serverFunction, ...args) => {
      return new Promise((resolve, reject) => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[serverFunction](...args);
        } else {
          fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            redirect: 'follow',
            body: JSON.stringify({ action: serverFunction, args: args })
          }).then(res => res.json()).then(data => {
            if (data.error) reject(new Error(data.message)); else resolve(data);
          }).catch(err => reject(err));
        }
      });
    };

    const ScrambleText = ({ text }) => {
      const [display, setDisplay] = useState(text);
      useEffect(() => {
        if (!text || text === '0') { setDisplay(text); return; }
        let iteration = 0;
        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";
        const strText = String(text);
        const interval = setInterval(() => {
          setDisplay(strText.split("").map((letter, index) => {
            if(index < iteration) return strText[index];
            return chars[Math.floor(Math.random() * chars.length)];
          }).join(""));
          if(iteration >= strText.length) clearInterval(interval);
          iteration += 1/2; 
        }, 35);
        return () => clearInterval(interval);
      }, [text]);
      return <span>{display}</span>;
    };

    function App() {
      const [isEng, setIsEng] = useState(safeGetStorage('fos_lang', 'false') === 'true');
      const handleLangToggle = () => {
          const next = !isEng;
          setIsEng(next);
          safeSetStorage('fos_lang', next.toString());
          setTerminalMsg(next ? '>> LANGUAGE OVERRIDE: ENGLISH ENGAGED.' : '>> 系統重構：工業賽博龐克啟動。');
      };
      const t = (zh, en) => isEng ? en : zh;

      const [inputTab, setInputTab] = useState('A'); 
      const [formDataB, setFormDataB] = useState({ tsla: '', qqq: '', tqqq: '', qld: '', eth: '', btc: '', usdRate: safeGetStorage('fos_usdRate', '32.5') });
      const [formData, setFormData] = useState({ lAmount: '', c0050: '', c00733: '', p1Value: '', p2Usdt: '0', btcAth: '73906.00', ethAth: '4956.62', emergencyWithdrawal: '' });
      const [simData, setSimData] = useState({ lChange: '', cChange: '' });
      const [history, setHistory] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      
      const isGasEnvironment = typeof google !== 'undefined' && google.script && google.script.run;
      const [terminalMsg, setTerminalMsg] = useState(`SYSTEM ONLINE. ${isGasEnvironment ? '[GAS NATIVE ENGINE]' : '[GITHUB DECOUPLED]'} - CYBER-BRUTALISM V14.0`);
      
      const [isPart9, setIsPart9] = useState(safeGetStorage('fos_isPart9', 'false') === 'true');
      const [escapeAmount, setEscapeAmount] = useState('');
      
      const [liveCrypto, setLiveCrypto] = useState({ BTC: 0, ETH: 0 });
      const [dualMaMatrix, setDualMaMatrix] = useState({ qqqPrice: '0.00', qqqMa: '0.00', tslaPrice: '0.00', tslaMa: '0.00', isLoading: true, error: null });
      const [betaConfig, setBetaConfig] = useState({ b0050: '1.0', b00733: '1.35', mrLimit: '130' });

      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => { 
        fetchHistory(); 
        fetchHistoryB();
        fetchDualMaMatrix();
        fetchCryptoConfig();
      }, []);

      const fetchCryptoConfig = async () => {
        try {
          const res = await gasAPI('getCryptoMatrix');
          if (res.success) setFormData(p => ({ ...p, p2Usdt: res.p2Usdt, btcAth: res.btcAth, ethAth: res.ethAth }));
        } catch (e) {}
      };

      const fetchDualMaMatrix = async () => {
        setDualMaMatrix(prev => ({ ...prev, isLoading: true, error: null }));
        try {
          const res = await gasAPI('getDualMaMatrix');
          if (res.success) {
            setDualMaMatrix({ qqqPrice: res.qqqPrice, qqqMa: res.qqqMa, tslaPrice: res.tslaPrice, tslaMa: res.tslaMa, isLoading: false, error: null });
            setTerminalMsg('>> DUAL-MA ENGINE SYNCHRONIZED.');
          } else setDualMaMatrix(prev => ({ ...prev, isLoading: false, error: res.message }));
        } catch (e) {
          setDualMaMatrix(prev => ({ ...prev, isLoading: false, error: '連線失敗' }));
        }
      };

      useEffect(() => {
        const fetchCrypto = async () => {
          try {
            const [btcRes, ethRes] = await Promise.all([ fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT'), fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT') ]);
            const btcData = await btcRes.json();
            const ethData = await ethRes.json();
            setLiveCrypto({ BTC: parseFloat(btcData.price), ETH: parseFloat(ethData.price) });
          } catch (e) {}
        };
        fetchCrypto();
        const interval = setInterval(fetchCrypto, 10000); 
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!chartRef.current || history.length === 0) return;
        const chartData = [...history].reverse();
        const labels = chartData.map(item => item.dateId ? String(item.dateId).substring(0, 10) : 'N/A');
        const mrData = chartData.map(item => parseFloat(item.nominalMR || 0));
        const p1Data = chartData.map(item => parseFloat(item.p1Ratio || 0));

        if (chartInstance.current) chartInstance.current.destroy();
        const ctx = chartRef.current.getContext('2d');

        Chart.defaults.font.size = 18;
        Chart.defaults.font.family = 'monospace';
        Chart.defaults.font.weight = 'bold';
        Chart.defaults.color = '#cbd5e1';

        chartInstance.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: t('維持率 (MR %)', 'MR %'), data: mrData, borderColor: '#10b981', backgroundColor: '#022c22', borderWidth: 6, tension: 0, fill: false, yAxisID: 'y', pointBackgroundColor: '#020617', pointBorderColor: '#10b981', pointBorderWidth: 4, pointRadius: 8, pointHoverRadius: 12 },
              { label: t('資金池 (P1 %)', 'P1 %'), data: p1Data, borderColor: '#a855f7', borderWidth: 4, borderDash: [10, 10], tension: 0, fill: false, yAxisID: 'y1', pointBackgroundColor: '#020617', pointBorderColor: '#a855f7', pointBorderWidth: 4, pointRadius: 8, pointHoverRadius: 12 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: { grid: { color: '#1e293b', lineWidth: 2 }, ticks: { color: '#94a3b8' }, border: { color: '#0ea5e9', width: 4 } },
              y: { position: 'left', grid: { color: '#1e293b', lineWidth: 2 }, title: { display: true, text: 'MR %', color: '#10b981', font: { size: 24, weight: '900' } }, border: { color: '#0ea5e9', width: 4 } },
              y1: { position: 'right', grid: { display: false }, title: { display: true, text: 'P1 %', color: '#a855f7', font: { size: 24, weight: '900' } }, border: { color: '#0ea5e9', width: 4 } }
            },
            plugins: { 
              legend: { position: 'top', labels: { color: '#38bdf8', font: { size: 20, weight: 'bold' }, usePointStyle: true, boxWidth: 20 } },
              tooltip: { backgroundColor: '#0f172a', titleColor: '#38bdf8', bodyColor: '#e2e8f0', borderColor: '#0ea5e9', borderWidth: 4, padding: 15, titleFont: { size: 20 }, bodyFont: { size: 18 }, cornerRadius: 0 } 
            }
          }
        });
      }, [history, isEng]);

      const fetchHistory = async () => {
        try {
          const res = await gasAPI('getHistoryData');
          if (res.success && res.data.length > 0) {
            setHistory(res.data);
            const latest = res.data[0];
            setFormData(p => ({ ...p, lAmount: p.lAmount || latest.lAmount, c0050: p.c0050 || latest.c0050, c00733: p.c00733 || latest.c00733, p1Value: p.p1Value || latest.p1Value }));
          }
        } catch (err) {}
      };

      const fetchHistoryB = async () => {
        try {
          const res = await gasAPI('getHistoryDataB');
          if (res.success && res.data && Object.keys(res.data).length > 0) {
            setFormDataB(p => ({ ...p, tsla: res.data.tsla ?? p.tsla, qqq: res.data.qqq ?? p.qqq, tqqq: res.data.tqqq ?? p.tqqq, qld: res.data.qld ?? p.qld, eth: res.data.eth ?? p.eth, btc: res.data.btc ?? p.btc }));
          }
        } catch (err) {}
      };

      const handleInputChange = (e) => setFormData(p => ({ ...p, [e.target.name]: e.target.value }));
      const handleInputBChange = (e) => { setFormDataB(p => ({ ...p, [e.target.name]: e.target.value })); if (e.target.name === 'usdRate') safeSetStorage('fos_usdRate', e.target.value); };
      const handleSimChange = (e) => setSimData(p => ({ ...p, [e.target.name]: e.target.value }));
      const handleBetaChange = (e) => setBetaConfig(p => ({ ...p, [e.target.name]: e.target.value }));

      const updateAth = (coin) => {
          const currentAth = coin === 'BTC' ? formData.btcAth : formData.ethAth;
          const newVal = window.prompt(`[SYS.ADMIN] Override ${coin} ATH:`, currentAth);
          if(newVal && !isNaN(newVal) && newVal.trim() !== '') setFormData(p => ({...p, [coin === 'BTC' ? 'btcAth' : 'ethAth']: newVal}));
      };

      const handleSyncCrypto = async () => {
        setIsSyncing(true); setTerminalMsg('>> SYNCING DATA...');
        try {
          const res = await gasAPI('saveCryptoMatrix', formData.p2Usdt, formData.btcAth, formData.ethAth);
          if (res.success) { setIsSyncing(false); setTerminalMsg('>> SYNC COMPLETE.'); setTimeout(() => setTerminalMsg(`SYSTEM ONLINE. CYBER-BRUTALISM V14.0`), 3000); } 
          else throw new Error();
        } catch (e) { setTerminalMsg('>> SYNC FAILED.'); setIsSyncing(false); }
      };

      // ==== 核心運算 ====
      const L = parseFloat(formData.lAmount) || 0;
      const c0050 = parseFloat(formData.c0050) || 0;
      const c00733 = parseFloat(formData.c00733) || 0;
      const C = c0050 + c00733;
      const P1 = parseFloat(formData.p1Value) || 0;
      const nominalMR = L > 0 ? ((C / L) * 100).toFixed(2) : '0.00';
      const p1Ratio = L > 0 ? ((P1 / L) * 100).toFixed(2) : '0.00';
      
      const b0050Val = parseFloat(betaConfig.b0050) || 1.0;
      const b00733Val = parseFloat(betaConfig.b00733) || 1.35;
      const limitMRVal = parseFloat(betaConfig.mrLimit) || 130;

      let portfolioBeta = 0; let maxMarketDrop = 0;
      if (C > 0 && L > 0) {
          portfolioBeta = ((c0050 * b0050Val) + (c00733 * b00733Val)) / C;
          const maxCollateralDrop = (C - (limitMRVal / 100) * L) / C;
          maxMarketDrop = (maxCollateralDrop / portfolioBeta) * 100;
      }
      const isCrashSafe = maxMarketDrop > 0;

      const currentBtc = liveCrypto.BTC || 0; const currentEth = liveCrypto.ETH || 0;
      const ethBtcRatio = currentBtc > 0 ? (currentEth / currentBtc).toFixed(4) : '0.0000';

      const btcAth = parseFloat(formData.btcAth) || 1;
      const ethAth = parseFloat(formData.ethAth) || 1;
      const btcDrawdown = (currentBtc > 0 && btcAth > 0) ? (((currentBtc - btcAth) / btcAth) * 100).toFixed(2) : '0.00';
      const ethDrawdown = (currentEth > 0 && ethAth > 0) ? (((currentEth - ethAth) / ethAth) * 100).toFixed(2) : '0.00';
      
      const getCryptoAction = (asset, currentPrice, athPrice, drawdown) => {
        const dd = parseFloat(drawdown);
        const price = parseFloat(currentPrice);
        const ath = parseFloat(athPrice);
        
        if (price > 0 && ath > 0) {
          if (price >= ath * 1.5) return { label: 'SHOT 3: LOCK', msg: 'SELL 10% → P2', ui: 'bg-red-500 text-black border-red-700' };
          if (price >= ath * 1.25) return { label: 'SHOT 2: LOCK', msg: 'SELL 10% → P2', ui: 'bg-red-500 text-black border-red-700' };
          if (price >= ath) return { label: 'SHOT 1: LOCK', msg: 'SELL 10% → P2', ui: 'bg-red-500 text-black border-red-700' };
        }

        if (dd <= -60) return { label: 'TIER 4 REBUY', msg: 'USE 30% P2', ui: 'bg-emerald-500 text-black border-emerald-700', target: asset };
        if (dd <= -50) return { label: 'TIER 3 REBUY', msg: 'USE 30% P2', ui: 'bg-emerald-500 text-black border-emerald-700', target: asset };
        if (dd <= -40) return { label: 'TIER 2 REBUY', msg: 'USE 20% P2', ui: 'bg-emerald-500 text-black border-emerald-700', target: asset };
        if (dd <= -30) return { label: 'TIER 1 REBUY', msg: 'USE 20% P2', ui: 'bg-emerald-500 text-black border-emerald-700', target: asset };
        return { label: 'DEFENDING', msg: 'HOLD & OBSERVE', ui: 'bg-slate-800 text-slate-300 border-slate-600', target: '' };
      };

      const btcAction = getCryptoAction('BTC', currentBtc, formData.btcAth, btcDrawdown);
      const ethAction = getCryptoAction('ETH', currentEth, formData.ethAth, ethDrawdown);

      const diffValue = Math.abs(c0050 - c00733);
      let targetInjection = t('已平衡', 'BALANCED');
      if (c0050 > 0 || c00733 > 0) { if (c0050 < c00733) targetInjection = '0050'; else if (c00733 < c0050) targetInjection = '00733'; }

      const L_Sim = Math.max(0, L + (parseFloat(simData.lChange) || 0));
      const C_Sim = Math.max(0, C + (parseFloat(simData.cChange) || 0));
      const simMR = L_Sim > 0 ? ((C_Sim / L_Sim) * 100).toFixed(2) : '0.00';

      const withdrawE = parseFloat(formData.emergencyWithdrawal) || 0;
      let hdpResult = null;
      if (withdrawE > 0 && L > 0 && C > 0) {
        const psac = L - (C - withdrawE) / 3.3; const newL = L - psac; const newP1 = P1 - psac; const finalDeathLine = newL * 0.0606;
        if (psac <= 0) hdpResult = { status: 'safe', msg: t('無須犧牲 P1。', 'Safe to cash out.'), psac: 0 };
        else if (newP1 < finalDeathLine) hdpResult = { status: 'danger', msg: t(`💀 擊穿 6.06% 死亡線！`, `💀 P1 Drops Below 6.06%!`), psac };
        else hdpResult = { status: 'ok', msg: t(`犧牲 P1: ${psac.toLocaleString('en-US', {maximumFractionDigits:0})}`, `Sacrifice P1: ${psac.toLocaleString('en-US', {maximumFractionDigits:0})}`), psac };
      }

      const formatNumber = (num) => isNaN(parseFloat(num)) ? '0' : parseFloat(num).toLocaleString('en-US', {maximumFractionDigits: 0});

      const handleSave = async (e) => {
        e.preventDefault(); if (L <= 0 || C <= 0) return;
        const previousHistory = [...history];
        const timezoneOffset = (new Date()).getTimezoneOffset() * 60000;
        const localISOTime = (new Date(Date.now() - timezoneOffset)).toISOString().replace('T', ' ').slice(0, 19).replace(/-/g, '/');
        const payload = { lAmount: L, c0050, c00733, p1Value: P1, btcPrice: currentBtc, ethPrice: currentEth, p2Usdt: formData.p2Usdt, nominalMR, p1Ratio, ethBtcRatio: ethBtcRatio };
        setHistory([{ dateId: `(SYNC) ${localISOTime}`, ...payload }, ...history].slice(0, 10)); 
        setTerminalMsg('>> SYNCING...');
        try { const res = await gasAPI('saveFOSData', payload); if (res.success) { fetchHistory(); setTerminalMsg('>> DONE.'); } else throw new Error(); } 
        catch (err) { setHistory(previousHistory); setTerminalMsg('>> FAILED.'); }
      };

      const handleSaveB = async (e) => {
        e.preventDefault(); setTerminalMsg('>> SYNCING B ACCOUNT...');
        try { const res = await gasAPI('saveFOSDataB', formDataB); if (res.success) { fetchHistoryB(); setTerminalMsg('>> DONE.'); } else throw new Error(); } 
        catch (err) { setTerminalMsg('>> FAILED.'); }
      };

      const handleDelete = async (dateId) => {
        if (!window.confirm(`ERASE: ${dateId}?`)) return;
        const previousHistory = [...history]; setHistory(history.filter(item => item.dateId !== dateId)); setTerminalMsg('>> DELETING...');
        try { const res = await gasAPI('deleteFOSData', dateId); if (res.success) setTerminalMsg('>> DONE.'); else throw new Error(); } 
        catch (err) { setHistory(previousHistory); setTerminalMsg('>> FAILED.'); }

                <h2 className="text-3xl font-black uppercase border-b-4 border-slate-700 pb-4 mb-8 text-slate-300"><ScrambleText text="RADAR (LAST 10)" /></h2>
                <div className="w-full flex-1 relative"><canvas ref={chartRef}></canvas></div>
              </div>

              {/* HISTORY MATRIX */}
              <div className="c-panel-base border-slate-600 shadow-[8px_8px_0_0_#1e293b] p-0 bg-slate-900 overflow-hidden">
                <h2 className="text-3xl font-black uppercase bg-slate-950 border-b-4 border-slate-800 text-slate-300 p-6"><ScrambleText text="HISTORY MATRIX" /></h2>
                <div className="overflow-x-auto">
                  <table className="w-full text-left whitespace-nowrap text-xl font-black">
                    <thead>
                      <tr className="bg-slate-800 border-b-4 border-slate-950 uppercase text-slate-400">
                        <th className="p-4 border-r-4 border-slate-950">TIME</th>
                        <th className="p-4 border-r-4 border-slate-950 text-right">L</th>
                        <th className="p-4 border-r-4 border-slate-950 text-right">C50</th>
                        <th className="p-4 border-r-4 border-slate-950 text-right">C733</th>
                        <th className="p-4 border-r-4 border-slate-950 text-right">P1</th>
                        <th className="p-4 border-r-4 border-slate-950 text-right">MR%</th>
                        <th className="p-4 border-r-4 border-slate-950 text-right">P1%</th>
                        <th className="p-4 text-center">ACT</th>
                      </tr>
                    </thead>
                    <tbody>
                      {history.map((item, idx) => (
                        <tr key={idx} className="border-b-4 border-slate-950 hover:bg-slate-800 transition-colors text-slate-300">
                          <td className="p-4 border-r-4 border-slate-950 text-cyan-400">{item.dateId}</td>
                          <td className="p-4 border-r-4 border-slate-950 text-right">{formatNumber(item.lAmount)}</td>
                          <td className="p-4 border-r-4 border-slate-950 text-right">{formatNumber(item.c0050)}</td>
                          <td className="p-4 border-r-4 border-slate-950 text-right">{formatNumber(item.c00733)}</td>
                          <td className="p-4 border-r-4 border-slate-950 text-right">{formatNumber(item.p1Value)}</td>
                          <td className="p-4 border-r-4 border-slate-950 text-right text-emerald-400">{item.nominalMR}%</td>
                          <td className="p-4 border-r-4 border-slate-950 text-right text-purple-400">{item.p1Ratio}%</td>
                          <td className="p-4 text-center">
                            <button onClick={() => handleDelete(item.dateId)} className="bg-slate-950 text-red-500 px-4 py-2 border-2 border-red-900 hover:bg-red-500 hover:text-black transition-colors">DEL</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
          
          <div className="text-center mt-20">
            <div className="inline-block bg-slate-950 text-slate-500 text-3xl font-black uppercase tracking-widest px-12 py-6 shadow-[8px_8px_0_0_#0ea5e9] border-4 border-sky-500 hover:shadow-none hover:translate-x-2 hover:translate-y-2 transition-all">
              AUTHORIZED BY CHANGSHENG LIU
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
