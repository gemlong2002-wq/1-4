  <script>
    (function() {
      const canvas = document.getElementById('fos-cyber-bg');
      if (!canvas || !canvas.getContext) return;
      const ctx = canvas.getContext('2d');
      
      let width, height;
      let nodes = [];
      const connectionDistance = 180;
      const nodeCount = 80;

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Node {
        constructor() {
          this.x = Math.random() * width;
          this.y = Math.random() * height;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 2 + 1;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > width) this.vx *= -1;
          if (this.y < 0 || this.y > height) this.vy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(52, 211, 153, 0.6)'; // Emerald
          ctx.fill();
        }
      }

      for (let i = 0; i < nodeCount; i++) {
        nodes.push(new Node());
      }

      let time = 0;

      function animate() {
        ctx.fillStyle = '#020617'; // slate-950 background
        ctx.fillRect(0, 0, width, height);

        time += 0.5;

        // Draw shifting geometric grid
        ctx.strokeStyle = 'rgba(30, 41, 59, 0.4)'; // slate-800
        ctx.lineWidth = 1;
        const gridSize = 80;
        const offsetX = time % gridSize;
        const offsetY = (time * 0.5) % gridSize;
        
        ctx.beginPath();
        for (let x = -offsetX; x < width; x += gridSize) {
          ctx.moveTo(x, 0); ctx.lineTo(x, height);
        }
        for (let y = -offsetY; y < height; y += gridSize) {
          ctx.moveTo(0, y); ctx.lineTo(width, y);
        }
        ctx.stroke();

        // Update and draw nodes
        nodes.forEach(node => {
          node.update();
          node.draw();
        });

        // Draw neural connections
        for (let i = 0; i < nodes.length; i++) {
          for (let j = i + 1; j < nodes.length; j++) {
            const dx = nodes[i].x - nodes[j].x;
            const dy = nodes[i].y - nodes[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < connectionDistance) {
              ctx.beginPath();
              ctx.moveTo(nodes[i].x, nodes[i].y);
              ctx.lineTo(nodes[j].x, nodes[j].y);
              // Opacity scales with distance
              const alpha = 1 - (dist / connectionDistance);
              ctx.strokeStyle = `rgba(56, 189, 248, ${alpha * 0.5})`; // sky-400
              ctx.lineWidth = alpha * 1.5;
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>

        const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*";

            return chars[Math.floor(Math.random() * chars.length)];
          }).join(""));

          iteration += 1/2;

        return () => clearInterval(interval);
