      opacity: 1;
      background: linear-gradient(45deg, rgba(56,189,248,0.4), rgba(139,92,246,0.3));

    /* 數據彈性縮放卡片 (字體極限放大 + 全息陰影) */
    .scale-card .data-text { 
      transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);

    .scale-card:hover .data-text { 
      transform: scale(1.25); 
      text-shadow: 0 15px 30px rgba(14, 165, 233, 0.4);

    .scale-card:hover .data-text-massive { 
      transform: scale(1.35);

    .tech-input {
      background: #f8fafc;

      border-radius: 1.5rem;
      font-size: 1.5rem;

      transition: all 0.2s ease;
      outline: none;
    }
    .tech-input:focus {
      background: #ffffff;
      border-color: #38bdf8;
      box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
    }

    /* 科技按鍵 */
    .tech-btn {
      border-radius: 1.5rem;
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-transform: uppercase;
      font-weight: 800;
      cursor: pointer;
    }
    .tech-btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 20px -5px rgba(0,0,0,0.15);
    }
    .tech-btn:active { transform: translateY(0); box-shadow: none; }

    /* 現代化開關 */
    .tech-toggle { position: relative; display: inline-block; width: 70px; height: 36px; flex-shrink: 0; }
    .tech-toggle input { opacity: 0; width: 0; height: 0; }
    .tech-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; border-radius: 36px; transition: .3s; }

<body class="clean-grid-bg text-slate-800 font-sans min-h-screen relative overflow-x-hidden pt-8 pb-20 selection:bg-sky-200 text-lg md:text-xl">

  <div id="root" class="relative z-10"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    const safeGetStorage = (key, defVal) => { try { return localStorage.getItem(key) || defVal; } catch(e) { return defVal; } };
    const safeSetStorage = (key, val) => { try { localStorage.setItem(key, val); } catch(e) {} };

    // === SMART DUAL-NODE API ROUTER ===
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxWnT6COS2NuL5LmtRZql5UmvEHcFDEtdha2SY5-NI3RBjHxV5xz0oUWlQL1M7P-0GN/exec';
    
    const gasAPI = (serverFunction, ...args) => {
      return new Promise((resolve, reject) => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[serverFunction](...args);
        } else {
          fetch(GAS_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            redirect: 'follow',
            body: JSON.stringify({ action: serverFunction, args: args })
          }).then(res => res.json()).then(data => {
            if (data.error) reject(new Error(data.message)); else resolve(data);
          }).catch(err => reject(err));
        }
      });
    };

    function App() {
      const [isEng, setIsEng] = useState(safeGetStorage('fos_lang', 'false') === 'true');
      const handleLangToggle = () => {
          const next = !isEng;
          setIsEng(next);
          safeSetStorage('fos_lang', next.toString());
          setTerminalMsg(next ? '>> LANGUAGE OVERRIDE: ENGLISH ENGAGED.' : '>> 系統重構：全息白境模式啟動。');
      };
      const t = (zh, en) => isEng ? en : zh;

      const [inputTab, setInputTab] = useState('A'); 
      const [formDataB, setFormDataB] = useState({ tsla: '', qqq: '', tqqq: '', qld: '', eth: '', btc: '', usdRate: safeGetStorage('fos_usdRate', '32.5') });
      const [formData, setFormData] = useState({ lAmount: '', c0050: '', c00733: '', p1Value: '', p2Usdt: '0', btcAth: '73906.00', ethAth: '4956.62', emergencyWithdrawal: '' });
      const [simData, setSimData] = useState({ lChange: '', cChange: '' });
      const [history, setHistory] = useState([]);
      const [isSyncing, setIsSyncing] = useState(false);
      
      const isGasEnvironment = typeof google !== 'undefined' && google.script && google.script.run;
      const [terminalMsg, setTerminalMsg] = useState(`SYSTEM ONLINE. ${isGasEnvironment ? '[GAS NATIVE ENGINE]' : '[GITHUB DECOUPLED]'} - V15.1 HOLOGRAPHIC`);
      
      const [isPart9, setIsPart9] = useState(safeGetStorage('fos_isPart9', 'false') === 'true');
      const [escapeAmount, setEscapeAmount] = useState('');
      
      const [liveCrypto, setLiveCrypto] = useState({ BTC: 0, ETH: 0 });
      const [dualMaMatrix, setDualMaMatrix] = useState({ qqqPrice: '0.00', qqqMa: '0.00', tslaPrice: '0.00', tslaMa: '0.00', isLoading: true, error: null });
      const [betaConfig, setBetaConfig] = useState({ b0050: '1.0', b00733: '1.35', mrLimit: '130' });

      const chartRef = useRef(null);
      const chartInstance = useRef(null);

      useEffect(() => { 
        fetchHistory(); 
        fetchHistoryB();
        fetchDualMaMatrix();
        fetchCryptoConfig();
      }, []);

      const fetchCryptoConfig = async () => {
        try {
          const res = await gasAPI('getCryptoMatrix');
          if (res.success) setFormData(p => ({ ...p, p2Usdt: res.p2Usdt, btcAth: res.btcAth, ethAth: res.ethAth }));
        } catch (e) {}
      };

      const fetchDualMaMatrix = async () => {
        setDualMaMatrix(prev => ({ ...prev, isLoading: true, error: null }));
        try {
          const res = await gasAPI('getDualMaMatrix');
          if (res.success) {
            setDualMaMatrix({ qqqPrice: res.qqqPrice, qqqMa: res.qqqMa, tslaPrice: res.tslaPrice, tslaMa: res.tslaMa, isLoading: false, error: null });
            setTerminalMsg('>> DUAL-MA ENGINE SYNCHRONIZED.');
          } else setDualMaMatrix(prev => ({ ...prev, isLoading: false, error: res.message }));
        } catch (e) {
          setDualMaMatrix(prev => ({ ...prev, isLoading: false, error: '連線失敗' }));
        }
      };

      useEffect(() => {
        const fetchCrypto = async () => {
          try {
           const [btcRes, ethRes] = await Promise.all([ 
  fetch('https://api.binance.us/api/v3/ticker/price?symbol=BTCUSDT'), 
  fetch('https://api.binance.us/api/v3/ticker/price?symbol=ETHUSDT') 
]);
            const btcData = await btcRes.json();
            const ethData = await ethRes.json();
            setLiveCrypto({ BTC: parseFloat(btcData.price), ETH: parseFloat(ethData.price) });
          } catch (e) {}
        };
        fetchCrypto();
        const interval = setInterval(fetchCrypto, 10000); 
        return () => clearInterval(interval);
      }, []);

      useEffect(() => {
        if (!chartRef.current || history.length === 0) return;
        const chartData = [...history].reverse();
        const labels = chartData.map(item => item.dateId ? String(item.dateId).substring(0, 10) : 'N/A');
        const mrData = chartData.map(item => parseFloat(item.nominalMR || 0));
        const p1Data = chartData.map(item => parseFloat(item.p1Ratio || 0));

        if (chartInstance.current) chartInstance.current.destroy();
        const ctx = chartRef.current.getContext('2d');
        
        const gradientMR = ctx.createLinearGradient(0, 0, 0, 400);
        gradientMR.addColorStop(0, 'rgba(14, 165, 233, 0.3)'); // sky-500
        gradientMR.addColorStop(1, 'rgba(14, 165, 233, 0)');

        Chart.defaults.font.size = 16;
        Chart.defaults.font.family = 'Inter, sans-serif';
        Chart.defaults.font.weight = 'bold';
        Chart.defaults.color = '#64748b'; // slate-500

        chartInstance.current = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [
              { label: t('維持率 (MR %)', 'MR %'), data: mrData, borderColor: '#0ea5e9', backgroundColor: gradientMR, borderWidth: 4, tension: 0.4, fill: true, yAxisID: 'y', pointBackgroundColor: '#ffffff', pointBorderColor: '#0ea5e9', pointBorderWidth: 3, pointRadius: 6, pointHoverRadius: 10 },
              { label: t('資金池 (P1 %)', 'P1 %'), data: p1Data, borderColor: '#8b5cf6', borderWidth: 3, borderDash: [6, 6], tension: 0.4, fill: false, yAxisID: 'y1', pointBackgroundColor: '#ffffff', pointBorderColor: '#8b5cf6', pointBorderWidth: 3, pointRadius: 6, pointHoverRadius: 10 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: { grid: { color: '#f1f5f9', lineWidth: 1 }, ticks: { color: '#64748b' }, border: { display: false } },
              y: { position: 'left', grid: { color: '#f1f5f9', lineWidth: 1 }, title: { display: true, text: 'MR %', color: '#0ea5e9', font: { size: 18, weight: '800' } }, border: { display: false } },
              y1: { position: 'right', grid: { display: false }, title: { display: true, text: 'P1 %', color: '#8b5cf6', font: { size: 18, weight: '800' } }, border: { display: false } }
            },
            plugins: { 
              legend: { position: 'top', labels: { color: '#334155', font: { size: 16, weight: 'bold' }, usePointStyle: true, boxWidth: 12 } },
              tooltip: { backgroundColor: 'rgba(255, 255, 255, 0.95)', titleColor: '#0f172a', bodyColor: '#334155', borderColor: '#e2e8f0', borderWidth: 1, padding: 12, titleFont: { size: 16 }, bodyFont: { size: 16 }, cornerRadius: 12, displayColors: true, boxShadow: '0 4px 6px -1px rgba(0, 0, 0, 0.1)' } 
            }
          }
        });
      }, [history, isEng]);

      const fetchHistory = async () => {
        try {
          const res = await gasAPI('getHistoryData');
          if (res.success && res.data.length > 0) {
            setHistory(res.data);
            const latest = res.data[0];
            setFormData(p => ({ ...p, lAmount: p.lAmount || latest.lAmount, c0050: p.c0050 || latest.c0050, c00733: p.c00733 || latest.c00733, p1Value: p.p1Value || latest.p1Value }));
          }
        } catch (err) {}
      };

      const fetchHistoryB = async () => {
        try {
          const res = await gasAPI('getHistoryDataB');
          if (res.success && res.data && Object.keys(res.data).length > 0) {
            setFormDataB(p => ({ ...p, tsla: res.data.tsla ?? p.tsla, qqq: res.data.qqq ?? p.qqq, tqqq: res.data.tqqq ?? p.tqqq, qld: res.data.qld ?? p.qld, eth: res.data.eth ?? p.eth, btc: res.data.btc ?? p.btc }));
          }
        } catch (err) {}
      };

      const handleInputChange = (e) => setFormData(p => ({ ...p, [e.target.name]: e.target.value }));
      const handleInputBChange = (e) => { setFormDataB(p => ({ ...p, [e.target.name]: e.target.value })); if (e.target.name === 'usdRate') safeSetStorage('fos_usdRate', e.target.value); };
      const handleSimChange = (e) => setSimData(p => ({ ...p, [e.target.name]: e.target.value }));
      const handleBetaChange = (e) => setBetaConfig(p => ({ ...p, [e.target.name]: e.target.value }));

      const updateAth = (coin) => {
          const currentAth = coin === 'BTC' ? formData.btcAth : formData.ethAth;
          const newVal = window.prompt(`[SYS.ADMIN] Override ${coin} ATH:`, currentAth);
          if(newVal && !isNaN(newVal) && newVal.trim() !== '') setFormData(p => ({...p, [coin === 'BTC' ? 'btcAth' : 'ethAth']: newVal}));
      };

      const handleSyncCrypto = async () => {
        setIsSyncing(true); setTerminalMsg('>> SYNCING DATA...');
        try {
          const res = await gasAPI('saveCryptoMatrix', formData.p2Usdt, formData.btcAth, formData.ethAth);
          if (res.success) { setIsSyncing(false); setTerminalMsg('>> SYNC COMPLETE.'); setTimeout(() => setTerminalMsg(`SYSTEM ONLINE. PURE WHITE LAB V15.1`), 3000); } 
          else throw new Error();
        } catch (e) { setTerminalMsg('>> SYNC FAILED.'); setIsSyncing(false); }
      };

      // ==== 核心運算 ====
      const L = parseFloat(formData.lAmount) || 0;
      const c0050 = parseFloat(formData.c0050) || 0;
      const c00733 = parseFloat(formData.c00733) || 0;
      const C = c0050 + c00733;
      const P1 = parseFloat(formData.p1Value) || 0;
      const nominalMR = L > 0 ? ((C / L) * 100).toFixed(2) : '0.00';
      const p1Ratio = L > 0 ? ((P1 / L) * 100).toFixed(2) : '0.00';
      
      const b0050Val = parseFloat(betaConfig.b0050) || 1.0;
      const b00733Val = parseFloat(betaConfig.b00733) || 1.35;
      const limitMRVal = parseFloat(betaConfig.mrLimit) || 130;

      let portfolioBeta = 0; let maxMarketDrop = 0;
      if (C > 0 && L > 0) {
          portfolioBeta = ((c0050 * b0050Val) + (c00733 * b00733Val)) / C;
          const maxCollateralDrop = (C - (limitMRVal / 100) * L) / C;
          maxMarketDrop = (maxCollateralDrop / portfolioBeta) * 100;
      }
      const isCrashSafe = maxMarketDrop > 0;

      const currentBtc = liveCrypto.BTC || 0; const currentEth = liveCrypto.ETH || 0;
      const ethBtcRatio = currentBtc > 0 ? (currentEth / currentBtc).toFixed(4) : '0.0000';

      const btcAth = parseFloat(formData.btcAth) || 1;
      const ethAth = parseFloat(formData.ethAth) || 1;
      const btcDrawdown = (currentBtc > 0 && btcAth > 0) ? (((currentBtc - btcAth) / btcAth) * 100).toFixed(2) : '0.00';
      const ethDrawdown = (currentEth > 0 && ethAth > 0) ? (((currentEth - ethAth) / ethAth) * 100).toFixed(2) : '0.00';
      
      const getCryptoAction = (asset, currentPrice, athPrice, drawdown) => {
        const dd = parseFloat(drawdown);
        const price = parseFloat(currentPrice);
        const ath = parseFloat(athPrice);
        
        if (price > 0 && ath > 0) {
          if (price >= ath * 1.5) return { label: 'SHOT 3: LOCK', msg: 'SELL 10% → P2', ui: 'bg-rose-100 text-rose-600 border-rose-200' };
          if (price >= ath * 1.25) return { label: 'SHOT 2: LOCK', msg: 'SELL 10% → P2', ui: 'bg-rose-100 text-rose-600 border-rose-200' };
          if (price >= ath) return { label: 'SHOT 1: LOCK', msg: 'SELL 10% → P2', ui: 'bg-rose-100 text-rose-600 border-rose-200' };
        }

        if (dd <= -60) return { label: 'TIER 4 REBUY', msg: 'USE 30% P2', ui: 'bg-emerald-100 text-emerald-700 border-emerald-200', target: asset };
        if (dd <= -50) return { label: 'TIER 3 REBUY', msg: 'USE 30% P2', ui: 'bg-emerald-100 text-emerald-700 border-emerald-200', target: asset };
        if (dd <= -40) return { label: 'TIER 2 REBUY', msg: 'USE 20% P2', ui: 'bg-emerald-100 text-emerald-700 border-emerald-200', target: asset };
        if (dd <= -30) return { label: 'TIER 1 REBUY', msg: 'USE 20% P2', ui: 'bg-emerald-100 text-emerald-700 border-emerald-200', target: asset };
        return { label: 'DEFENDING', msg: 'HOLD & OBSERVE', ui: 'bg-slate-100 text-slate-500 border-slate-200', target: '' };
      };

      const btcAction = getCryptoAction('BTC', currentBtc, formData.btcAth, btcDrawdown);
      const ethAction = getCryptoAction('ETH', currentEth, formData.ethAth, ethDrawdown);

      const diffValue = Math.abs(c0050 - c00733);
      let targetInjection = t('已平衡', 'BALANCED');
      if (c0050 > 0 || c00733 > 0) { if (c0050 < c00733) targetInjection = '0050'; else if (c00733 < c0050) targetInjection = '00733'; }

      const L_Sim = Math.max(0, L + (parseFloat(simData.lChange) || 0));
      const C_Sim = Math.max(0, C + (parseFloat(simData.cChange) || 0));
      const simMR = L_Sim > 0 ? ((C_Sim / L_Sim) * 100).toFixed(2) : '0.00';

      const withdrawE = parseFloat(formData.emergencyWithdrawal) || 0;
      let hdpResult = null;
      if (withdrawE > 0 && L > 0 && C > 0) {
        const psac = L - (C - withdrawE) / 3.3; const newL = L - psac; const newP1 = P1 - psac; const finalDeathLine = newL * 0.0606;
        if (psac <= 0) hdpResult = { status: 'safe', msg: t('維持率極佳，無須犧牲 P1', 'Safe to cash out.'), psac: 0 };
        else if (newP1 < finalDeathLine) hdpResult = { status: 'danger', msg: t(`❌ 擊穿 6.06% 死亡線！嚴禁執行！`, `❌ P1 Drops Below 6.06%!`), psac };
        else hdpResult = { status: 'ok', msg: t(`犧牲 P1: ${psac.toLocaleString('en-US', {maximumFractionDigits:0})}`, `Sacrifice P1: ${psac.toLocaleString('en-US', {maximumFractionDigits:0})}`), psac };
      }

      const formatNumber = (num) => isNaN(parseFloat(num)) ? '0' : parseFloat(num).toLocaleString('en-US', {maximumFractionDigits: 0});

      const handleSave = async (e) => {
        e.preventDefault(); if (L <= 0 || C <= 0) return;
        const previousHistory = [...history];
        const timezoneOffset = (new Date()).getTimezoneOffset() * 60000;
        const localISOTime = (new Date(Date.now() - timezoneOffset)).toISOString().replace('T', ' ').slice(0, 19).replace(/-/g, '/');
        const payload = { lAmount: L, c0050, c00733, p1Value: P1, btcPrice: currentBtc, ethPrice: currentEth, p2Usdt: formData.p2Usdt, nominalMR, p1Ratio, ethBtcRatio: ethBtcRatio };
        setHistory([{ dateId: `(SYNC) ${localISOTime}`, ...payload }, ...history].slice(0, 10)); 
        setTerminalMsg('>> SYNCING...');
        try { const res = await gasAPI('saveFOSData', payload); if (res.success) { fetchHistory(); setTerminalMsg('>> DONE.'); } else throw new Error(); } 
        catch (err) { setHistory(previousHistory); setTerminalMsg('>> FAILED.'); }
      };

      const handleSaveB = async (e) => {
        e.preventDefault(); setTerminalMsg('>> SYNCING B ACCOUNT...');
        try { const res = await gasAPI('saveFOSDataB', formDataB); if (res.success) { fetchHistoryB(); setTerminalMsg('>> DONE.'); } else throw new Error(); } 
        catch (err) { setTerminalMsg('>> FAILED.'); }
      };

      const handleDelete = async (dateId) => {
        if (!window.confirm(`ERASE: ${dateId}?`)) return;
        const previousHistory = [...history]; setHistory(history.filter(item => item.dateId !== dateId)); setTerminalMsg('>> DELETING...');
        try { const res = await gasAPI('deleteFOSData', dateId); if (res.success) setTerminalMsg('>> DONE.'); else throw new Error(); } 
        catch (err) { setHistory(previousHistory); setTerminalMsg('>> FAILED.'); }
      };

      const getMRZone = (mr) => {
        const val = parseFloat(mr);
        if (val === 0) return { dot: 'bg-slate-300', text: 'text-slate-400', label: 'STANDBY' };
        if (val >= 350) return { dot: 'bg-emerald-500 shadow-[0_0_10px_#10b981]', text: 'text-emerald-500', label: 'ZONE 1' };
        if (val >= 330) return { dot: 'bg-yellow-500 shadow-[0_0_10px_#eab308]', text: 'text-yellow-600', label: 'ZONE 2' };
        if (val >= 310) return { dot: 'bg-orange-500 shadow-[0_0_10px_#f97316]', text: 'text-orange-500', label: 'ZONE 3' };
        return { dot: 'bg-rose-500 shadow-[0_0_10px_#f43f5e] animate-pulse', text: 'text-rose-500', label: 'DANGER' };

                <div className="bg-slate-50 p-6 border-t border-slate-200 flex justify-between items-center">
                  <span className="text-sm font-bold uppercase text-slate-400 tracking-widest">P2 (USDT)</span>
                  <input type="number" name="p2Usdt" value={formData.p2Usdt} onChange={handleInputChange} className="w-48 tech-input text-right text-xl py-2 px-4" />
                </div>
                
                {/* CRYPTO BILLBOARD */}
                <div className={`p-6 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4 ${consensusColor}`}>
                  <div className="text-sm font-bold uppercase tracking-widest opacity-80">CONSENSUS {consensusMsg}</div>
                  <div className="text-2xl font-black uppercase tracking-wider">100% BUY {consensusTarget}</div>
                </div>
              </div>

              {/* RADAR CHART */}
              <div className="tech-panel p-8 h-[500px] flex flex-col">
                <h2 className="text-xl font-black uppercase text-slate-700 mb-6 flex items-center gap-2">
                  <svg className="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
                  RADAR (LAST 10)
                </h2>
                <div className="w-full flex-1 relative"><canvas ref={chartRef}></canvas></div>
              </div>

              {/* HISTORY MATRIX */}
              <div className="tech-panel p-0 overflow-hidden">
                <h2 className="text-xl font-black uppercase bg-slate-50 border-b border-slate-200 text-slate-700 p-6 flex items-center gap-2">
                  <svg className="w-5 h-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                  HISTORY MATRIX
                </h2>
                <div className="overflow-x-auto">
                  <table className="w-full text-left whitespace-nowrap text-sm font-mono">
                    <thead>
                      <tr className="bg-white border-b border-slate-100 text-slate-400">
                        <th className="p-4 font-semibold uppercase tracking-wider">TIME</th>
                        <th className="p-4 font-semibold uppercase tracking-wider text-right">L</th>
                        <th className="p-4 font-semibold uppercase tracking-wider text-right">C50</th>
                        <th className="p-4 font-semibold uppercase tracking-wider text-right">C733</th>
                        <th className="p-4 font-semibold uppercase tracking-wider text-right">P1</th>
                        <th className="p-4 font-semibold uppercase tracking-wider text-right">MR%</th>
                        <th className="p-4 font-semibold uppercase tracking-wider text-right">P1%</th>
                        <th className="p-4 text-center font-semibold uppercase tracking-wider">ACT</th>
                      </tr>
                    </thead>
                    <tbody className="text-slate-600 font-bold">
                      {history.map((item, idx) => (
                        <tr key={idx} className="border-b border-slate-50 hover:bg-slate-50 transition-colors">
                          <td className="p-4 text-sky-600">{item.dateId}</td>
                          <td className="p-4 text-right">{formatNumber(item.lAmount)}</td>
                          <td className="p-4 text-right">{formatNumber(item.c0050)}</td>
                          <td className="p-4 text-right">{formatNumber(item.c00733)}</td>
                          <td className="p-4 text-right">{formatNumber(item.p1Value)}</td>
                          <td className="p-4 text-right text-emerald-500">{item.nominalMR}%</td>
                          <td className="p-4 text-right text-violet-500">{item.p1Ratio}%</td>
                          <td className="p-4 text-center">
                            <button onClick={() => handleDelete(item.dateId)} className="text-slate-300 hover:text-rose-500 hover:bg-rose-50 px-3 py-1 rounded-full transition-colors text-xs font-bold">DEL</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

            </div>
          </div>
          
          <div className="text-center mt-16 relative z-20 pb-8">
            <div className="inline-block bg-white text-slate-400 text-sm font-bold uppercase tracking-widest px-8 py-3 rounded-full border border-slate-200 shadow-sm hover:shadow-md hover:-translate-y-1 transition-all cursor-crosshair">
              AUTHORIZED BY CHANGSHENG LIU
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
